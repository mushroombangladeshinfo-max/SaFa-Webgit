<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — SaFa Naturals</title>

  <!-- ── Fonts & Global Styles ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body { padding: 60px 5%; background: var(--g900); }
    
    .admin-title { font-family: var(--fd); font-size: 36px; color: var(--c); margin-bottom: 8px; }
    .admin-title em { color: var(--a); font-style: italic; }
    
    .hidden { display: none !important; }
    
    .fade-transition { transition: opacity 0.3s ease; }
    
    /* Login Form */
    .login-container { max-width: 400px; margin: 80px auto; background: var(--g800); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,.07); text-align: center; }
    .login-container input { width: 100%; padding: 14px; margin-bottom: 16px; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); color: var(--c); border-radius: 6px; outline: none; font-family: var(--fb); }
    .login-container input:focus { border-color: rgba(196,154,60,.5); background: rgba(255,255,255,.07); }
    
    /* Dashboard Table */
    .admin-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; }
    .admin-header-right { display: flex; gap: 12px; align-items: center; }
    .admin-search { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.1); padding: 10px 14px; color: var(--c); border-radius: 6px; outline: none; font-family: var(--fb); font-size: 13.5px; width: 220px; transition: border-color .2s; }
    .admin-search::placeholder { color: rgba(245,239,230,.3); }
    .admin-search:focus { border-color: rgba(196,154,60,.5); background: rgba(255,255,255,.07); }
    
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
      cursor: pointer;
    }

    .admin-table { width: 100%; border-collapse: collapse; background: var(--g800); border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,.07); }
    .admin-table th, .admin-table td { padding: 14px 20px; text-align: left; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 14px; color: var(--c); }
    .admin-table th { background: rgba(255,255,255,.02); color: rgba(245,239,230,.5); font-family: var(--fl); font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; font-weight: 700; }
    .admin-table tr:last-child td { border-bottom: none; }
    
    select { background: var(--g900); color: var(--c); border: 1px solid rgba(255,255,255,.15); padding: 8px 12px; border-radius: 4px; font-family: var(--fb); font-size: 13px; cursor: pointer; outline: none; }
    select:focus { border-color: var(--a); }
    
    .btn-admin-action {
      padding: 6px 12px;
      font-size: 11px;
      letter-spacing: .08em;
    }
    .btn-mark-paid { color: #5fcf80 !important; border-color: rgba(95,207,128,.3) !important; }
    .btn-mark-paid:hover { background: rgba(95,207,128,.1) !important; border-color: #5fcf80 !important; }
    
    /* Loading Skeleton & Buttons */
    @keyframes pulse-skeleton {
      0% { opacity: 0.3; }
      50% { opacity: 0.7; }
      100% { opacity: 0.3; }
    }
    .skeleton-box {
      background: rgba(255,255,255,0.06);
      height: 16px;
      border-radius: 4px;
      animation: pulse-skeleton 1.5s infinite ease-in-out;
    }
    .btn-loading {
      color: transparent !important;
      pointer-events: none;
      position: relative;
    }
    .btn-loading::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 16px; height: 16px; margin: -8px 0 0 -8px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    /* Empty States */
    .admin-empty {
      text-align: center; padding: 48px 24px !important;
      color: rgba(245,239,230,.5); background: rgba(255,255,255,.01);
    }
    .admin-empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.6; }

    .payment-status-badge {
      font-family: var(--fl); font-size: 9px; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: 4px 8px; border-radius: 4px; display: inline-block;
    }
    .payment-status-badge.paid   { background: rgba(95,207,128,.15); color: #5fcf80; }
    .payment-status-badge.unpaid { background: rgba(217,178,84,.15); color: var(--al); }
    
    .admin-pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
    .admin-pagination span { color: rgba(245,239,230,.6); font-size: 13px; font-family: var(--fb); }
    .admin-pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .status-toast { position: fixed; bottom: 20px; right: 20px; background: #5fcf80; color: #060d09; padding: 12px 24px; border-radius: 4px; font-weight: 600; font-size: 13px; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; }
    .status-toast.show { transform: translateY(0); opacity: 1; }

    .dashboard-widgets { display: flex; gap: 20px; margin-bottom: 24px; }
    .widget { background: rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,.05); border-radius: 8px; padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .widget-title { font-family: var(--fl); font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(245,239,230,.5); margin-bottom: 8px; }
    .widget-value { font-family: var(--fd); font-size: 32px; font-weight: 300; color: var(--al); line-height: 1; }
  </style>
  <script type="module" crossorigin src="/assets/admin-BChAvMqb.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/main-q8TLCeIc.js">
  <link rel="stylesheet" crossorigin href="/assets/main-Dy9Li3jC.css">
</head>
<body>

  <!-- LOGIN SECTION -->
  <div id="login-section" class="login-container fade-transition">
    <h1 class="admin-title">Admin <em>Access</em></h1>
    <p style="color: rgba(245,239,230,.5); margin-bottom: 24px; font-size: 14px;">Sign in to manage orders.</p>
    <form id="admin-login-form">
      <input type="email" id="admin-email" placeholder="Admin Email" required autocomplete="email">
      <input type="password" id="admin-password" placeholder="Password" required autocomplete="current-password">
      <button type="submit" id="login-btn" class="btn-primary" style="width: 100%; justify-content: center;">Log In</button>
    </form>
  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section" class="hidden fade-transition">
    <div class="admin-header">
      <h1 class="admin-title">Order <em>Management</em></h1>
      <div class="admin-header-right">
        <input type="date" id="filter-date-from" class="admin-search" style="width: 130px;" title="From Date">
        <span style="color: rgba(245,239,230,.5); font-size: 13px;">to</span>
        <input type="date" id="filter-date-to" class="admin-search" style="width: 130px;" title="To Date">
        <input type="tel" id="search-input" class="admin-search" placeholder="Search phone...">
        <button id="export-btn" class="btn-ghost-dark">Export CSV</button>
        <button id="logout-btn" class="btn-ghost-dark">Log Out</button>
      </div>
    </div>

    <div class="dashboard-widgets">
      <div class="widget">
        <div class="widget-title">Today's Sales</div>
        <div class="widget-value" id="today-sales-val">৳0</div>
      </div>
      <div class="widget">
        <div class="widget-title">Today's Orders</div>
        <div class="widget-value" id="today-orders-val">0</div>
      </div>
    </div>
    
    <table class="admin-table">
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Location</th>
          <th>Total</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="order-list">
        <!-- Injected via JS -->
      </tbody>
    </table>
    
    <div id="pagination-controls" class="admin-pagination" style="display: none;">
      <button id="btn-prev" class="btn-ghost-dark" style="padding: 8px 16px;">Previous</button>
      <span id="page-info">Page 1</span>
      <button id="btn-next" class="btn-ghost-dark" style="padding: 8px 16px;">Next</button>
    </div>

    <!-- ── INVENTORY MANAGEMENT SECTION ── -->
    <div style="margin-top: 60px;">
      <div class="admin-header">
        <h2 class="admin-title" style="font-size: 28px;">Inventory <em>Management</em></h2>
        <button id="refresh-stock-btn" class="btn-ghost-dark">Refresh Stock</button>
      </div>
      <table class="admin-table">
        <thead>
          <tr>
            <th>Product ID</th>
            <th>Name</th>
            <th>Current Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-list">
          <!-- Injected via JS -->
        </tbody>
      </table>
    </div>
  </div>

  <div id="toast" class="status-toast">Status Updated!</div>

</body>
</html>
