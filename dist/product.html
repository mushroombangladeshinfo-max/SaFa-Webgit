  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1a472a;
      --green2: #2d6a4f;
      --leaf:   #52b788;
      --gold:   #c9a84c;
      --cream:  #faf7f2;
      --white:  #ffffff;
      --ink:    #1c1c1e;
      --muted:  #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0,0,0,.07);
      --r:      14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
    }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      padding: 14px 24px;
      font-size: .8rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      max-width: 1200px; margin: 0 auto;
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--green); }
    .breadcrumb svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── PRODUCT HERO ── */
    .product-hero {
      max-width: 1200px;
      margin: 0 auto 48px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
    }
    @media (max-width: 768px) {
      .product-hero { grid-template-columns: 1fr; gap: 24px; }
    }

    /* ── IMAGE SIDE ── */
    .img-wrap {
      position: sticky; top: 80px;
      border-radius: 20px;
      overflow: hidden;
      background: var(--white);
      box-shadow: var(--shadow);
      aspect-ratio: 1/1;
      display: flex; align-items: center; justify-content: center;
    }
    .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .5s cubic-bezier(.4,0,.2,1);
    }
    .img-wrap:hover img { transform: scale(1.04); }
    .img-badges {
      position: absolute; top: 16px; left: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .img-badge {
      font-size: .7rem; font-weight: 800; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 20px;
      font-family: 'Syne', sans-serif;
    }
    .badge-gold { background: var(--gold); color: #fff; }
    .badge-red  { background: #e53e3e; color: #fff; }
    .badge-grey { background: rgba(0,0,0,.55); color: #fff; }

    /* ── INFO SIDE ── */
    .info-side { padding-top: 8px; }
    .prod-eyebrow {
      font-size: .72rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--leaf);
      margin-bottom: 10px;
    }
    .prod-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 800; color: var(--green);
      line-height: 1.15; margin-bottom: 6px;
    }
    .prod-name-bn {
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 1rem; color: var(--muted);
      margin-bottom: 16px;
    }

    /* Rating */
    .rating-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px;
    }
    .stars { color: var(--gold); font-size: 1rem; letter-spacing: 1px; }
    .rating-num { font-size: .9rem; font-weight: 700; }
    .rating-count { font-size: .8rem; color: var(--muted); }
    .rating-sep { width: 1px; height: 14px; background: var(--border); }

    /* Price */
    .price-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 6px;
    }
    .prod-price {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 700; color: var(--green);
    }
    .prod-unit {
      font-size: .85rem; color: var(--muted); font-weight: 500;
    }
    .delivery-note {
      font-size: .8rem; color: var(--leaf); font-weight: 600;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 5px;
    }

    /* Tags */
    .prod-tags {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 24px;
    }
    .prod-tag {
      font-size: .7rem; font-weight: 700; letter-spacing: .5px;
      padding: 4px 10px; border-radius: 20px;
      background: #f0fdf4; color: var(--green);
      border: 1px solid #bbf7d0;
    }

    /* Qty + Cart */
    .cart-row {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .qty-stepper {
      display: flex; align-items: center;
      border: 1.5px solid var(--border);
      border-radius: 10px; overflow: hidden;
      background: var(--white);
    }
    .qty-btn {
      width: 42px; height: 48px;
      background: none; border: none; cursor: pointer;
      font-size: 1.2rem; color: var(--green); font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .qty-btn:hover { background: var(--cream); }
    .qty-num {
      width: 44px; text-align: center;
      font-size: 1rem; font-weight: 700;
      color: var(--ink);
    }
    .btn-add-cart {
      flex: 1; min-width: 180px;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #fff; border: none; border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700; letter-spacing: .5px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .15s;
    }
    .btn-add-cart:hover { opacity: .92; transform: translateY(-1px); }
    .btn-add-cart:active { transform: translateY(0); }
    .btn-add-cart.added {
      background: linear-gradient(135deg, var(--leaf), #40916c);
    }
    .btn-add-cart svg { width: 18px; height: 18px; }

    .btn-wa-small {
      padding: 14px 20px;
      background: #25d366; color: #fff;
      border: none; border-radius: 10px;
      cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 7px;
      font-size: .85rem; font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .btn-wa-small:hover { opacity: .9; }
    .btn-wa-small svg { width: 18px; height: 18px; }

    /* Trust badges */
    .trust-strip {
      display: flex; flex-wrap: wrap; gap: 10px;
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .trust-item {
      display: flex; align-items: center; gap: 7px;
      font-size: .78rem; font-weight: 600; color: var(--muted);
    }
    .trust-item svg { width: 16px; height: 16px; color: var(--leaf); flex-shrink: 0; }

    /* Coming soon overlay */
    .coming-overlay {
      position: absolute; inset: 0;
      background: rgba(250,247,242,.85);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
      backdrop-filter: blur(2px);
    }
    .coming-overlay span {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem; font-weight: 800;
      color: var(--green); letter-spacing: 2px;
    }
    .coming-overlay small { font-size: .8rem; color: var(--muted); }

    /* ── TABS ── */
    .tabs-section {
      max-width: 1200px;
      margin: 0 auto 64px;
      padding: 0 24px;
    }

    .tab-nav {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--border);
      margin-bottom: 32px;
      overflow-x: auto;
    }
    .tab-btn {
      padding: 12px 24px;
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active {
      color: var(--green);
      border-bottom-color: var(--green);
    }
    .tab-btn:hover:not(.active) { color: var(--ink); }

    .tab-panel { display: none; }
    .tab-panel.active {
      display: block;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* About panel */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 640px) { .about-grid { grid-template-columns: 1fr; } }
    .about-desc {
      font-size: 1rem; line-height: 1.8;
      color: #374151;
      font-family: 'Hind Siliguri', sans-serif;
    }
    .about-benefits { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .about-benefits li {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: .9rem; line-height: 1.5;
    }
    .benefit-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--leaf));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .benefit-dot svg { width: 11px; height: 11px; color: #fff; }

    /* Nutrition panel */
    .nutrition-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 640px) { .nutrition-grid { grid-template-columns: 1fr; } }
    .nutrition-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .nutrition-card h3 {
      font-size: .8rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 20px;
    }
    .nutr-row { margin-bottom: 16px; }
    .nutr-label {
      display: flex; justify-content: space-between;
      font-size: .85rem; font-weight: 600;
      margin-bottom: 6px;
    }
    .nutr-label span:last-child { color: var(--green); }
    .nutr-bar-bg {
      height: 6px; border-radius: 99px;
      background: var(--border); overflow: hidden;
    }
    .nutr-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--green), var(--leaf));
      width: 0;
      transition: width .9s cubic-bezier(.4,0,.2,1);
    }
    .calorie-box {
      text-align: center; padding: 24px 0;
    }
    .calorie-num {
      font-family: 'Syne', sans-serif;
      font-size: 3rem; font-weight: 800; color: var(--green);
      line-height: 1;
    }
    .calorie-label { font-size: .85rem; color: var(--muted); margin-top: 4px; }
    .calorie-sub { font-size: .75rem; color: var(--muted); margin-top: 8px; }

    /* How to Use panel */
    .how-grid { display: flex; flex-direction: column; gap: 20px; }
    .how-item {
      display: flex; gap: 20px; align-items: flex-start;
      background: var(--white);
      border-radius: var(--r);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }
    .how-num {
      width: 40px; height: 40px; flex-shrink: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--leaf));
      color: #fff; font-family: 'Syne', sans-serif;
      font-size: .95rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .how-content h4 {
      font-size: .95rem; font-weight: 700; margin-bottom: 4px;
    }
    .how-content p {
      font-size: .85rem; color: #4b5563; line-height: 1.6;
      font-family: 'Hind Siliguri', sans-serif;
    }

    /* Reviews panel */
    .reviews-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .reviews-avg {
      display: flex; align-items: center; gap: 16px;
    }
    .avg-num {
      font-family: 'Syne', sans-serif;
      font-size: 3.5rem; font-weight: 800; color: var(--green);
      line-height: 1;
    }
    .avg-stars { color: var(--gold); font-size: 1.2rem; letter-spacing: 2px; }
    .avg-count { font-size: .8rem; color: var(--muted); }

    .btn-write-review {
      padding: 11px 20px;
      background: var(--green); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .85rem; font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-write-review:hover { opacity: .88; }

    .review-list { display: flex; flex-direction: column; gap: 16px; }
    .review-card {
      background: var(--white);
      border-radius: var(--r);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }
    .review-top {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 10px; gap: 8px;
    }
    .reviewer-name { font-weight: 700; font-size: .9rem; }
    .review-stars { color: var(--gold); font-size: .9rem; }
    .review-date { font-size: .75rem; color: var(--muted); margin-top: 2px; }
    .review-body {
      font-size: .875rem; color: #374151;
      line-height: 1.7;
      font-family: 'Hind Siliguri', sans-serif;
    }
    .verified-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: .7rem; color: var(--leaf); font-weight: 700;
      margin-top: 8px;
    }
    .verified-badge svg { width: 12px; height: 12px; }

    .no-reviews {
      text-align: center; padding: 40px 0;
      color: var(--muted); font-size: .9rem;
    }

    /* Review form */
    .review-form-wrap {
      background: var(--white);
      border-radius: var(--r);
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      display: none;
    }
    .review-form-wrap.open { display: block; animation: fadeIn .3s ease; }
    .review-form-wrap h3 {
      font-size: 1rem; font-weight: 700; margin-bottom: 20px;
      color: var(--green);
    }
    .star-input {
      display: flex; gap: 4px; margin-bottom: 16px;
    }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.6rem; color: #d1d5db;
      transition: color .15s, transform .15s;
      padding: 2px;
    }
    .star-btn.active, .star-btn:hover ~ .star-btn { color: var(--gold); }
    .star-btn.active { transform: scale(1.15); color: var(--gold); }
    .rf-field { margin-bottom: 14px; }
    .rf-field label {
      display: block; font-size: .78rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .4px; margin-bottom: 5px;
    }
    .rf-field input, .rf-field textarea {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem;
      color: var(--ink); background: var(--cream);
      outline: none; transition: border-color .2s;
      resize: none;
    }
    .rf-field input:focus, .rf-field textarea:focus {
      border-color: var(--leaf);
      background: #fff;
    }
    .rf-row { display: flex; gap: 12px; }
    .rf-row .rf-field { flex: 1; }
    .btn-submit-review {
      padding: 12px 24px;
      background: var(--green); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-submit-review:hover { opacity: .88; }
    .btn-submit-review:disabled { opacity: .5; cursor: not-allowed; }

    /* ── RELATED ── */
    .related-section {
      max-width: 1200px; margin: 0 auto 64px; padding: 0 24px;
    }
    .related-section h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem; font-weight: 800;
      color: var(--green); margin-bottom: 24px;
    }
    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }
    .related-card {
      background: var(--white);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
      text-decoration: none; color: inherit;
      transition: transform .2s, box-shadow .2s;
      display: block;
    }
    .related-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,.12);
    }
    .related-img {
      width: 100%; aspect-ratio: 4/3;
      object-fit: cover;
    }
    .related-info { padding: 16px; }
    .related-name { font-weight: 700; font-size: .95rem; margin-bottom: 4px; }
    .related-price { font-size: .9rem; color: var(--green); font-weight: 700; }
    .related-unit { font-size: .75rem; color: var(--muted); }

    /* ── NOT FOUND ── */
    .not-found {
      text-align: center; padding: 80px 24px;
    }
    .not-found h2 { font-size: 1.5rem; color: var(--green); margin-bottom: 12px; }
    .not-found p { color: var(--muted); margin-bottom: 24px; }
    .not-found a {
      display: inline-block; padding: 12px 28px;
      background: var(--green); color: #fff;
      border-radius: 10px; text-decoration: none;
      font-weight: 700;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink); color: #fff;
      padding: 13px 24px; border-radius: 99px;
      font-size: .875rem; font-weight: 600;
      z-index: 9999; white-space: nowrap;
      transition: transform .35s cubic-bezier(.16,1,.3,1), opacity .35s;
      opacity: 0; pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.green { background: var(--green); }
  </style>
